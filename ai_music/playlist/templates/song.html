<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#121212;
        color:white;
    }

    nav{
        background:#1e1e1e;
        padding:20px 50px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
        box-shadow:0 3px 10px rgba(0,0,0,0.5);
    }

    .logo{
        font-size:30px;
        font-weight:bold;
        color:#1DB954;
    }

    .nav-right{
        display:flex;
        align-items:center;
        gap:15px;
    }

    .btn{
        padding:10px 18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
    }

    .login-btn{
        background:#1DB954;
    }

    .login-btn a{
        text-decoration:none;
        color:white;
    }

    .logout-btn{
        background:#ff4d4d;
        color:white;
    }

    .search-box{
        display:flex;
        gap:10px;
    }

    .search-box input{
        padding:10px;
        width:250px;
        border:none;
        border-radius:8px;
        outline:none;
    }

    .search-btn{
        background:#00bcd4;
        color:white;
    }

    h1{
        text-align:center;
        margin:40px 0;
        color:#1DB954;
        font-size:45px;
    }

    .container{
        width:90%;
        margin:auto;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
        gap:25px;
        padding-bottom:50px;
    }

    .song-link{
        text-decoration:none;
        color:white;
    }

    .card{
        background:#1e1e1e;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.5);
        transition:0.3s;
        cursor:pointer;
    }

    .card:hover{
        transform:translateY(-10px);
    }

    .card img{
        width:100%;
        height:250px;
        object-fit:cover;
    }

    .card-body{
        padding:20px;
    }

    .card-body h2{
        color:#1DB954;
        margin-bottom:10px;
    }

    .card-body p{
        margin:8px 0;
        color:#ddd;
    }

    .like{
        color:#ff4d4d;
        font-weight:bold;
        margin-top:10px;
    }
</style>
```

</head>

<body>

```
<nav>
    <div class="logo">@Playlist 🎵</div>

    <div class="nav-right">

        <button class="btn login-btn">
            <a href="/">Login</a>
        </button>

        <button class="btn logout-btn">
            Logout
        </button>

        <form method="GET" class="search-box">
            <input type="text"
                   name="search"
                   placeholder="🔍 Search Songs">

            <button type="submit"
                    class="btn search-btn">
                Search
            </button>
        </form>

    </div>
</nav>

<h1>🎶 GAZEL PLAYLIST 🎶</h1>

<div class="container">

    {% for i in akash %}

    <a href="{% url 'song_detail' i.id %}" class="song-link">

        <div class="card">

            <img src="{{ i.image.url }}" alt="Song Image">

            <div class="card-body">

                <h2>{{ i.title }}</h2>

                <p><strong>Artist:</strong> {{ i.artist }}</p>

                <p><strong>Movie:</strong> {{ i.movie }}</p>

                <p class="like">❤️ Likes : {{ i.like }}</p>

            </div>

        </div>

    </a>

    {% empty %}
        <h2>No Songs Found</h2>
    {% endfor %}

</div>
```

</body>
</html>
