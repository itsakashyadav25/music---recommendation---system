<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .container{
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }

    .container h1{
        color: #333;
        margin-bottom: 30px;
    }

    .input-box{
        width: 100%;
        margin-bottom: 20px;
    }

    .input-box input{
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 10px;
        outline: none;
        font-size: 16px;
        transition: 0.3s;
    }

    .input-box input:focus{
        border-color: #4facfe;
    }

    .btn-box{
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 20px;
    }

    button{
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn{
        background: #4facfe;
        color: white;
    }

    .login-btn:hover{
        background: #2d8cf0;
    }

    .reset-btn{
        background: #ff4d4d;
        color: white;
    }

    .reset-btn:hover{
        background: #e63939;
    }

    .signup{
        margin-top: 25px;
    }

    .signup a{
        text-decoration: none;
        color: #4facfe;
        font-weight: bold;
    }

    .signup a:hover{
        text-decoration: underline;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Login</h1>

    <form method="POST" action="">
        {% csrf_token %}

        <div class="input-box">
            <input type="email" name="user"
                   placeholder="Enter your Email" required>
        </div>

        <div class="input-box">
            <input type="password" name="password"
                   placeholder="Enter your Password" required>
        </div>

        <div class="btn-box">
            <button type="submit" class="login-btn">
                LOGIN
            </button>

            <button type="reset" class="reset-btn">
                RESET
            </button>
        </div>
    </form>

    <div class="signup">
        <p>Don't have an account?</p>
        <a href="signup/">Create New Account</a>
    </div>
</div>

</body>
</html>
